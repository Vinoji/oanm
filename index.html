<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>System Update</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #0a0a0a;
      color: #00ffcc;
      font-family: monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    h1 {
      margin-bottom: 20px;
    }

    .progress-container {
      width: 300px;
      height: 25px;
      border: 2px solid #00ffcc;
      border-radius: 5px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: #00ffcc;
      animation: load 5s linear forwards;
    }

    @keyframes load {
      0% { width: 0%; }
      100% { width: 100%; }
    }

    .message {
      margin-top: 20px;
      font-size: 18px;
      opacity: 0;
      animation: showMsg 1s ease forwards;
      animation-delay: 5s;
    }

    @keyframes showMsg {
      to { opacity: 1; }
    }
  </style>
</head>
<body>

  <h1>⚠️ System Update in Progress...</h1>

  <div class="progress-container">
    <div class="progress-bar"></div>
  </div>

  <div class="message">
    😆 April Fool! Nothing happened!
  </div>

</body>
</html>
