<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Security Alert</title>

<style>
body {
  margin: 0;
  background: #111;
  color: #ff3b3b;
  font-family: Arial, sans-serif;
  text-align: center;
  overflow: hidden;
}

.container {
  margin-top: 100px;
}

h1 {
  font-size: 40px;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0.3; }
}

.progress {
  width: 80%;
  margin: 30px auto;
  height: 20px;
  background: #333;
  border-radius: 10px;
  overflow: hidden;
}

.bar {
  height: 100%;
  width: 0%;
  background: red;
  animation: load 10s linear forwards;
}

@keyframes load {
  from { width: 0%; }
  to { width: 100%; }
}

.countdown {
  font-size: 28px;
  margin-top: 20px;
}

button {
  margin-top: 20px;
  padding: 12px 25px;
  font-size: 18px;
  background: black;
  color: red;
  border: 2px solid red;
  cursor: pointer;
}

.shake {
  animation: shake 0.2s infinite;
}

@keyframes shake {
  0% { transform: translate(2px, 2px); }
  50% { transform: translate(-2px, -2px); }
  100% { transform: translate(2px, -2px); }
}
</style>
</head>

<body class="shake">

<div class="container">
  <h1>⚠️ VIRUS DETECTED ⚠️</h1>
  <p>System files are being deleted...</p>

  <div class="progress">
    <div class="bar"></div>
  </div>

  <div class="countdown" id="count">10</div>

  <button onclick="fix()">FIX NOW</button>
</div>

<script>
let time = 10;
let countEl = document.getElementById("count");

// beep sound
let beep = new Audio("https://www.soundjay.com/button/beep-07.wav");
setInterval(() => {
  beep.play();
}, 1000);

let timer = setInterval(() => {
  time--;
  countEl.innerText = time;

  if (time <= 0) {
    clearInterval(timer);
    document.body.innerHTML = `
      <h1 style="color:white; margin-top:100px;">
        😂 APRIL FOOL 😂<br><br>
        Your system is safe!
      </h1>
    `;
  }
}, 1000);

function fix() {
  document.body.innerHTML = `
    <h1 style="color:white; margin-top:100px;">
      😎 Nice try!<br><br>
      APRIL FOOL 😂
    </h1>
  `;
}
</script>

</body>
</html>
